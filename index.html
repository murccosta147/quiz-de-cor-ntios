<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campeonato Bíblico Pro</title>
    <style>
        :root {
            --primary: #0F172A; --brand: #1E3A8A; --brand-light: #3B82F6;
            --accent: #B45309; --accent-light: #F59E0B; --bg-color: #FAF9F6;
            --card-bg: #FFFFFF; --text-main: #334155; --text-title: #1E293B;
            --border: #E2E8F0; --success: #15803D; --danger: #B91C1C;
            --flashcard-bg: #F8FAFC; --pts-color: #8B5CF6;
        }

        body.dark-theme {
            --primary: #F1F5F9; --brand: #3B82F6; --brand-light: #60A5FA;
            --accent: #F59E0B; --accent-light: #FBBF24; --bg-color: #0F172A;
            --card-bg: #1E293B; --text-main: #CBD5E1; --text-title: #F1F5F9;
            --border: #334155; --success: #22C55E; --danger: #EF4444;
            --flashcard-bg: #334155; --pts-color: #A78BFA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }
        
        header { background-color: #0F172A; color: white; padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--accent); }
        nav { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.4rem; font-weight: 700; color: white; }
        .logo span { color: var(--accent-light); }
        .theme-toggle { background: var(--accent); border: none; color: white; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        
        .nav-links button { background: none; border: none; color: #94A3B8; font-size: 0.95rem; font-weight: 600; margin-left: 0.5rem; cursor: pointer; padding: 0.6rem 1.1rem; border-radius: 6px; }
        .nav-links button.active { background-color: var(--brand); color: white; }

        main { max-width: 1000px; margin: 2.5rem auto; padding: 0 2rem; min-height: 75vh; }
        section { display: none; background: var(--card-bg); padding: 3rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        section.active { display: block; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--text-title); font-size: 1.8rem; margin-bottom: 1.5rem; font-weight: 800; }
        p { margin-bottom: 1.2rem; font-size: 1.05rem; }

        .btn { background-color: var(--brand); color: white; border: none; padding: 0.9rem 1.8rem; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
        .btn:hover { filter: brightness(1.2); }
        .btn-accent { background-color: var(--accent); }

        select { padding: 0.9rem; border-radius: 8px; border: 2px solid var(--border); font-size: 1rem; width: 100%; margin-bottom: 1.5rem; background-color: var(--flashcard-bg); color: var(--text-title); font-weight: bold; }
        .quiz-meta-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; background: var(--flashcard-bg); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); }
        .badge-pts { background: var(--pts-color); color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 800; font-size: 0.9rem; }
        .badge-diff { background: var(--border); color: var(--text-title); padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }

        .question-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 2rem; color: var(--text-title); line-height: 1.5; }
        
        .options-container { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .option-label { display: flex; align-items: center; padding: 1.2rem; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 1.05rem; font-weight: 500; background: var(--card-bg); }
        .option-label:hover { border-color: var(--brand-light); }
        .option-label input { margin-right: 1.2rem; transform: scale(1.3); }
        .option-label.correct { border-color: var(--success) !important; background: #f0fdf4 !important; color: #14532d; font-weight: 700; }
        .option-label.incorrect { border-color: var(--danger) !important; background: #fef2f2 !important; color: #7f1d1d; }

        .input-fill { border: 0; border-bottom: 3px solid var(--brand); background: transparent; font-size: 1.3rem; font-weight: 700; color: var(--brand); padding: 0 10px; text-align: center; outline: none; width: 180px; }
        .input-fill:focus { border-bottom-color: var(--accent); }
        .input-desc { width: 100%; height: 120px; padding: 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--flashcard-bg); color: var(--text-title); font-size: 1rem; resize: vertical; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { text-align: left; padding: 1.2rem; border-bottom: 1px solid var(--border); }
        th { background-color: var(--flashcard-bg); color: var(--text-title); font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">ACF Pro <span>Engine</span></div>
            <div>
                <button class="theme-toggle" onclick="toggleTheme()">Tema 🌓</button>
                <div class="nav-links" style="display:inline-block;">
                    <button id="nav-home" class="active" onclick="navigateTo('home')">Início</button>
                    <button id="nav-quiz" onclick="navigateTo('quiz-setup')">Novo Simulado</button>
                    <button id="nav-history" onclick="navigateTo('history')">Histórico</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="active">
            <h1>Plataforma de Alta Performance</h1>
            <p>Bem-vindo ao motor de testes bíblicos. Escolha o módulo, o nível de dificuldade e inicie o campeonato.</p>
            <button class="btn btn-accent" onclick="navigateTo('quiz-setup')">Configurar Desafio</button>
        </section>

        <section id="quiz-setup">
            <h1>Definição de Prova</h1>
            <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Escolha o Módulo:</label>
            <select id="quiz-mode">
                <optgroup label="Simulados Individuais (Normal e Difícil)">
                    <option value="cap1-normal">Capítulo 1 - Normal</option><option value="cap1-hard">Capítulo 1 - Difícil</option>
                    <option value="cap2-normal">Capítulo 2 - Normal</option><option value="cap2-hard">Capítulo 2 - Difícil</option>
                    <option value="cap3-normal">Capítulo 3 - Normal</option><option value="cap3-hard">Capítulo 3 - Difícil</option>
                    <option value="cap4-normal">Capítulo 4 - Normal</option><option value="cap4-hard">Capítulo 4 - Difícil</option>
                    <option value="cap5-normal">Capítulo 5 - Normal</option><option value="cap5-hard">Capítulo 5 - Difícil</option>
                    <option value="cap6-normal">Capítulo 6 - Normal</option><option value="cap6-hard">Capítulo 6 - Difícil</option>
                    <option value="cap7-normal">Capítulo 7 - Normal</option><option value="cap7-hard">Capítulo 7 - Difícil</option>
                    <option value="cap8-normal">Capítulo 8 - Normal</option><option value="cap8-hard">Capítulo 8 - Difícil</option>
                    <option value="cap9-normal">Capítulo 9 - Normal</option><option value="cap9-hard">Capítulo 9 - Difícil</option>
                    <option value="cap10-normal">Capítulo 10 - Normal</option><option value="cap10-hard">Capítulo 10 - Difícil</option>
                    <option value="cap11-normal">Capítulo 11 - Normal</option><option value="cap11-hard">Capítulo 11 - Difícil</option>
                    <option value="cap12-normal">Capítulo 12 - Normal</option><option value="cap12-hard">Capítulo 12 - Difícil</option>
                    <option value="cap13-normal">Capítulo 13 - Normal</option><option value="cap13-hard">Capítulo 13 - Difícil</option>
                    <option value="cap14-normal">Capítulo 14 - Normal</option><option value="cap14-hard">Capítulo 14 - Difícil</option>
                    <option value="cap15-normal">Capítulo 15 - Normal</option><option value="cap15-hard">Capítulo 15 - Difícil</option>
                    <option value="cap16-normal">Capítulo 16 - Normal</option><option value="cap16-hard">Capítulo 16 - Difícil</option>
                </optgroup>
                <optgroup label="Simulados Globais (Mistura de Conteúdos)">
                    <option value="geral-unico">Simulado Geral Exclusivo</option>
                    <option value="geral-random">Mega Mix Aleatório Total</option>
                </optgroup>
            </select>
            <button class="btn btn-accent" onclick="startEngine()">Iniciar Prova</button>
        </section>

        <section id="quiz-active">
            <div class="quiz-meta-line">
                <div><span style="font-weight:700; color:var(--brand);" id="q-counter"></span></div>
                <div style="display:flex; gap:10px;">
                    <span class="badge-diff" id="q-diff"></span>
                    <span class="badge-pts" id="q-pts"></span>
                </div>
            </div>
            <div class="question-text" id="question-text"></div>
            
            <div class="options-container" id="ui-mcq" style="display:none;"></div>
            <div id="ui-desc" style="display:none; margin-bottom:2rem;">
                <textarea class="input-desc" id="answer-desc" placeholder="Digite sua resposta descritiva aqui..."></textarea>
            </div>
            <div id="feedback-box" style="margin-bottom:1.5rem; font-weight:bold; font-size:1.1rem; display:none; padding:1rem; border-radius:8px;"></div>

            <div>
                <button class="btn" id="btn-submit" onclick="processAnswer()">Confirmar Resposta</button>
                <button class="btn btn-accent" id="btn-next" onclick="goNext()" style="display:none;">Próxima Questão</button>
            </div>
        </section>

        <section id="quiz-result">
            <h1>Resultado do Simulado</h1>
            <h2 id="final-score" style="font-size:2.5rem; margin-bottom:0;">0 Pts</h2>
            <p id="final-stats" style="font-size:1.2rem; font-weight:bold; margin-bottom:2rem;"></p>
            <button class="btn btn-accent" onclick="navigateTo('quiz-setup')">Novo Teste</button>
        </section>

        <section id="history">
            <h1>Registro de Desempenho</h1>
            <table>
                <thead><tr><th>Modo</th><th>Acertos</th><th>Pontuação</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        const questionBank = [
// ==========================================
            // BLOCO 1: CAPÍTULOS 1 A 4
            // ==========================================
            
            // --- CAPÍTULO 1 : NORMAL ---
            { cap: 1, diff: "normal", type: "mcq", pts: 10, q: "Como Paulo descreve a mensagem da cruz para aqueles que estão perecendo?", options: [{ text: "Uma loucura.", correct: true }, { text: "Um mistério oculto.", correct: false }, { text: "Um escândalo para os gregos.", correct: false }, { text: "Uma sabedoria inalcançável.", correct: false }] },
            { cap: 1, diff: "normal", type: "mcq", pts: 10, q: "Para os judeus e para os gregos, o que eles buscam respectivamente, segundo Paulo?", options: [{ text: "Judeus pedem sinal, e gregos buscam sabedoria.", correct: true }, { text: "Judeus buscam a lei, e gregos pedem milagres.", correct: false }, { text: "Judeus buscam sabedoria, e gregos pedem sinal.", correct: false }, { text: "Judeus pedem justiça, e gregos buscam filosofia.", correct: false }] },
            { cap: 1, diff: "normal", type: "fill", pts: 15, q: "Fiel é Deus, pelo qual fostes chamados para a <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> de seu Filho Jesus Cristo nosso Senhor.", answer: "comunhao" },
            { cap: 1, diff: "normal", type: "mcq", pts: 10, q: "Quem Paulo afirma ter batizado em Corinto, além de Crispo e Gaio?", options: [{ text: "A família de Estéfanas", correct: true }, { text: "A família de Apolo", correct: false }, { text: "Apenas Timóteo", correct: false }, { text: "A família de Filemom", correct: false }] },
            { cap: 1, diff: "normal", type: "fill", pts: 15, q: "Para que nenhuma carne se <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> perante ele.", answer: "glorie" },

            // --- CAPÍTULO 1 : DIFÍCIL ---
            { cap: 1, diff: "hard", type: "mcq", pts: 20, q: "Qual o propósito de Deus ao escolher as coisas fracas, vis e desprezíveis do mundo?", options: [{ text: "Para aniquilar as que são, e confundir os sábios e fortes.", correct: true }, { text: "Para mostrar que a pobreza é o único caminho da salvação.", correct: false }, { text: "Para julgar os anjos caídos no último dia.", correct: false }, { text: "Para que os gentios pudessem dominar sobre os judeus.", correct: false }] },
            { cap: 1, diff: "hard", type: "fill", pts: 25, q: "Mas vós sois dele, em Jesus Cristo, o qual para nós foi feito por Deus sabedoria, e justiça, e <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>, e redenção.", answer: "santificacao" },
            { cap: 1, diff: "hard", type: "desc", pts: 40, q: "Explique com suas palavras por que Paulo diz que Cristo não o enviou para batizar, mas para evangelizar, e como isso deveria ser feito.", keywords: ["sabedoria", "palavras", "cruz", "vã"] },
            { cap: 1, diff: "hard", type: "mcq", pts: 20, q: "Complete o raciocínio: 'Porque a loucura de Deus é...'", options: [{ text: "mais sábia do que os homens.", correct: true }, { text: "mais forte do que os anjos.", correct: false }, { text: "o poder para a salvação.", correct: false }, { text: "um mistério para os gregos.", correct: false }] },
            { cap: 1, diff: "hard", type: "fill", pts: 25, q: "Cristo, poder de Deus, e <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> de Deus.", answer: "sabedoria" },

            // --- CAPÍTULO 2 : NORMAL ---
            { cap: 2, diff: "normal", type: "mcq", pts: 10, q: "Quando Paulo foi aos coríntios, como ele diz que se apresentou?", options: [{ text: "Em fraqueza, temor e grande tremor.", correct: true }, { text: "Com palavras persuasivas de sabedoria humana.", correct: false }, { text: "Com autoridade apostólica e vara de ferro.", correct: false }, { text: "Em demonstração de riqueza e eloquência.", correct: false }] },
            { cap: 2, diff: "normal", type: "mcq", pts: 10, q: "O que Paulo propôs saber entre os coríntios?", options: [{ text: "Jesus Cristo, e este crucificado.", correct: true }, { text: "Os mistérios dos anjos.", correct: false }, { text: "A lei de Moisés aperfeiçoada.", correct: false }, { text: "As profecias do fim dos tempos.", correct: false }] },
            { cap: 2, diff: "normal", type: "fill", pts: 15, q: "As coisas que o olho não viu, e o ouvido não ouviu, e não subiram ao <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> do homem...", answer: "coracao" },
            { cap: 2, diff: "normal", type: "mcq", pts: 10, q: "Quem esquadrinha todas as coisas, até as profundezas de Deus?", options: [{ text: "O Espírito.", correct: true }, { text: "O homem espiritual.", correct: false }, { text: "Os profetas.", correct: false }, { text: "Os anjos celestiais.", correct: false }] },
            { cap: 2, diff: "normal", type: "fill", pts: 15, q: "Ora, o homem natural não compreende as coisas do Espírito de Deus, porque lhe parecem <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "loucura" },

            // --- CAPÍTULO 2 : DIFÍCIL ---
            { cap: 2, diff: "hard", type: "mcq", pts: 20, q: "Por que Paulo afirma que os príncipes deste mundo não conheceram a sabedoria oculta de Deus?", options: [{ text: "Porque se a conhecessem, nunca crucificariam ao Senhor da glória.", correct: true }, { text: "Porque seus corações estavam endurecidos pela filosofia grega.", correct: false }, { text: "Porque Deus cegou seus olhos para que não vissem a verdade.", correct: false }, { text: "Porque eles rejeitaram os profetas do Antigo Testamento.", correct: false }] },
            { cap: 2, diff: "hard", type: "fill", pts: 25, q: "Mas nós temos a <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> de Cristo.", answer: "mente" },
            { cap: 2, diff: "hard", type: "desc", pts: 40, q: "Segundo 1 Coríntios 2, diferencie o 'espírito do mundo' do 'Espírito que provém de Deus' em relação ao que nos é concedido.", keywords: ["mundo", "deus", "concedido", "gratuitamente", "saber"] },
            { cap: 2, diff: "hard", type: "mcq", pts: 20, q: "Como são discernidas as coisas do Espírito de Deus, segundo o texto?", options: [{ text: "Espiritualmente.", correct: true }, { text: "Pela mente renovada.", correct: false }, { text: "Pelos frutos do arrependimento.", correct: false }, { text: "Através da lei e dos profetas.", correct: false }] },
            { cap: 2, diff: "hard", type: "fill", pts: 25, q: "Para que a vossa fé não se apoiasse em sabedoria dos homens, mas no <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> de Deus.", answer: "poder" },

            // --- CAPÍTULO 3 : NORMAL ---
            { cap: 3, diff: "normal", type: "mcq", pts: 10, q: "Com o que Paulo alimentou os coríntios no início, por não serem espirituais?", options: [{ text: "Com leite, e não com carne.", correct: true }, { text: "Com carne, pois o leite é para bebês.", correct: false }, { text: "Com os rudimentos da lei.", correct: false }, { text: "Com profecias simples.", correct: false }] },
            { cap: 3, diff: "normal", type: "mcq", pts: 10, q: "Qual era o sinal claro de que os coríntios ainda eram 'carnais'?", options: [{ text: "Havia entre eles inveja, contendas e dissensões.", correct: true }, { text: "Eles estavam comendo carnes sacrificadas aos ídolos.", correct: false }, { text: "Eles não oravam em línguas.", correct: false }, { text: "Eles rejeitavam a autoridade de Cefas.", correct: false }] },
            { cap: 3, diff: "normal", type: "fill", pts: 15, q: "Eu plantei, Apolo regou; mas Deus deu o <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "crescimento" },
            { cap: 3, diff: "normal", type: "mcq", pts: 10, q: "Quem é o único fundamento que pode ser posto, segundo Paulo?", options: [{ text: "Jesus Cristo.", correct: true }, { text: "Os apóstolos e profetas.", correct: false }, { text: "A sã doutrina.", correct: false }, { text: "A graça de Deus.", correct: false }] },
            { cap: 3, diff: "normal", type: "fill", pts: 15, q: "Não sabeis vós que sois o <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> de Deus e que o Espírito de Deus habita em vós?", answer: "templo" },

            // --- CAPÍTULO 3 : DIFÍCIL ---
            { cap: 3, diff: "hard", type: "mcq", pts: 20, q: "O que acontecerá com a obra de cada um no Dia, segundo o versículo 13?", options: [{ text: "Será revelada pelo fogo, e o fogo provará qual seja a obra de cada um.", correct: true }, { text: "Será pesada na balança da justiça de Deus.", correct: false }, { text: "Será exposta diante dos anjos e dos homens.", correct: false }, { text: "Será guardada no céu como galardão eterno.", correct: false }] },
            { cap: 3, diff: "hard", type: "fill", pts: 25, q: "Se a obra de alguém se queimar, sofrerá detrimento; mas o tal será salvo, todavia como pelo <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "fogo" },
            { cap: 3, diff: "hard", type: "desc", pts: 40, q: "Explique a advertência de Paulo para aquele que destrói o templo de Deus em 1 Coríntios 3.", keywords: ["destruir", "deus", "santo", "templo"] },
            { cap: 3, diff: "hard", type: "mcq", pts: 20, q: "Quais materiais representam as obras superiores e inferiores na construção sobre o fundamento?", options: [{ text: "Ouro, prata, pedras preciosas / Madeira, feno, palha.", correct: true }, { text: "Ferro, bronze, mármore / Barro, folhagem, areia.", correct: false }, { text: "Ouro, prata, bronze / Madeira, barro, palha.", correct: false }, { text: "Pedras preciosas, ouro, ferro / Feno, palha, poeira.", correct: false }] },
            { cap: 3, diff: "hard", type: "fill", pts: 25, q: "Porque a sabedoria deste mundo é <input type='text' id='fill-ans' class='input-fill' autocomplete='off'> diante de Deus.", answer: "loucura" },

            // --- CAPÍTULO 4 : NORMAL ---
            { cap: 4, diff: "normal", type: "mcq", pts: 10, q: "Como Paulo quer que os homens os considerem?", options: [{ text: "Como ministros de Cristo e despenseiros dos mistérios de Deus.", correct: true }, { text: "Como mestres da lei e pais da igreja.", correct: false }, { text: "Como senhores da fé e profetas do Altíssimo.", correct: false }, { text: "Como líderes superiores a Apolo e Cefas.", correct: false }] },
            { cap: 4, diff: "normal", type: "mcq", pts: 10, q: "O que se requer dos despenseiros (administradores)?", options: [{ text: "Que cada um se ache fiel.", correct: true }, { text: "Que multipliquem os talentos.", correct: false }, { text: "Que tenham sabedoria humana.", correct: false }, { text: "Que não cobrem salário da igreja.", correct: false }] },
            { cap: 4, diff: "normal", type: "fill", pts: 15, q: "Portanto, nada julgueis antes de <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>, até que o Senhor venha.", answer: "tempo" },
            { cap: 4, diff: "normal", type: "mcq", pts: 10, q: "A quem Paulo diz que os apóstolos se tornaram um espetáculo?", options: [{ text: "Ao mundo, aos anjos e aos homens.", correct: true }, { text: "Aos judeus e aos gentios.", correct: false }, { text: "Ao imperador e aos governadores.", correct: false }, { text: "Aos crentes de Corinto e Éfeso.", correct: false }] },
            { cap: 4, diff: "normal", type: "fill", pts: 15, q: "Porque o reino de Deus não consiste em palavras, mas em <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "poder" },

            // --- CAPÍTULO 4 : DIFÍCIL ---
            { cap: 4, diff: "hard", type: "mcq", pts: 20, q: "Por que Paulo diz que aplicou essas coisas a si mesmo e a Apolo por amor aos coríntios?", options: [{ text: "Para que neles aprendessem a não ir além do que está escrito.", correct: true }, { text: "Para que soubessem quem era o verdadeiro apóstolo.", correct: false }, { text: "Para provar que ambos tinham o mesmo nível de autoridade.", correct: false }, { text: "Para que não se aliassem aos falsos mestres judeus.", correct: false }] },
            { cap: 4, diff: "hard", type: "fill", pts: 25, q: "Porque, ainda que tivésseis dez mil aios em Cristo, não teríeis, contudo, muitos <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "pais" },
            { cap: 4, diff: "hard", type: "desc", pts: 40, q: "No final de 1 Coríntios 4, Paulo dá aos coríntios duas opções sobre como ele poderia ir até eles. Quais são essas opções e o que elas significam?", keywords: ["vara", "amor", "espírito", "mansidão"] },
            { cap: 4, diff: "hard", type: "mcq", pts: 20, q: "Qual contraste Paulo faz entre a condição dos apóstolos e a dos coríntios no versículo 10?", options: [{ text: "Nós somos loucos por amor de Cristo, e vós sábios em Cristo.", correct: true }, { text: "Nós somos ricos pela graça, e vós pobres na carne.", correct: false }, { text: "Nós sofremos açoites, e vós governais o mundo.", correct: false }, { text: "Nós somos libertos da lei, e vós escravos das ordenanças.", correct: false }] },
            { cap: 4, diff: "hard", type: "fill", pts: 25, q: "E, enfadamo-nos, trabalhando com nossas próprias <input type='text' id='fill-ans' class='input-fill' autocomplete='off'>.", answer: "maos" },
        ];

        let activeQuestions = [];
        let currentIdx = 0, totalScore = 0, correctCount = 0, answered = false;

        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        function navigateTo(id) { 
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById(`nav-${id.split('-')[0]}`)) document.getElementById(`nav-${id.split('-')[0]}`).classList.add('active');
            if(id === 'history') renderHistory();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function removeAccents(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

        function startEngine() {
            const mode = document.getElementById('quiz-mode').value;
            let pool = [];
            let limit = 15;

            if (mode.startsWith('cap')) {
                const parts = mode.split('-');
                const capNum = parseInt(parts[0].replace('cap', ''));
                const diff = parts[1];
                pool = questionBank.filter(q => q.cap === capNum && q.diff === diff);
            } else if (mode === "geral-unico") {
                pool = questionBank.filter(q => q.diff === "general");
                limit = 30;
            } else if (mode === "geral-random") {
                pool = [...questionBank];
                limit = 30;
            }

            if(pool.length === 0) return alert("As perguntas deste módulo ainda não foram adicionadas!");

            activeQuestions = shuffle(pool).slice(0, limit);
            activeQuestions.forEach(q => { if(q.type === 'mcq') q.options = shuffle(q.options); });
            currentIdx = 0; totalScore = 0; correctCount = 0;
            navigateTo('quiz-active'); renderQ();
        }

        function renderQ() {
            answered = false; const q = activeQuestions[currentIdx];
            document.getElementById('q-counter').innerText = `Questão ${currentIdx + 1}/${activeQuestions.length}`;
            document.getElementById('q-diff').innerText = q.diff;
            document.getElementById('q-pts').innerText = `+${q.pts} Pts`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const uiMcq = document.getElementById('ui-mcq'), uiDesc = document.getElementById('ui-desc'), feedback = document.getElementById('feedback-box');
            uiMcq.style.display = 'none'; uiDesc.style.display = 'none'; feedback.style.display = 'none';
            document.getElementById('btn-submit').style.display = 'inline-flex'; document.getElementById('btn-next').style.display = 'none';

            if(q.type === 'mcq') {
                uiMcq.style.display = 'flex'; uiMcq.innerHTML = '';
                q.options.forEach((opt, idx) => {
                    uiMcq.innerHTML += `<label class="option-label" id="opt-lbl-${idx}"><input type="radio" name="r-ans" value="${idx}"> ${opt.text}</label>`;
                });
            } else if (q.type === 'desc') {
                uiDesc.style.display = 'block'; document.getElementById('answer-desc').value = '';
            }
        }

        function processAnswer() {
            if(answered) return; const q = activeQuestions[currentIdx]; const feedback = document.getElementById('feedback-box');
            let isCorrect = false;

            if(q.type === 'mcq') {
                const selected = document.querySelector('input[name="r-ans"]:checked');
                if(!selected) return alert("Selecione uma alternativa!");
                const val = parseInt(selected.value); isCorrect = q.options[val].correct;
                q.options.forEach((opt, idx) => {
                    const lbl = document.getElementById(`opt-lbl-${idx}`);
                    lbl.querySelector('input').disabled = true;
                    if(opt.correct) lbl.classList.add('correct');
                    if(idx === val && !opt.correct) lbl.classList.add('incorrect');
                });
            } else if (q.type === 'fill') {
                const input = document.getElementById('fill-ans');
                if(!input.value) return alert("Preencha a lacuna!");
                input.disabled = true;
                if(removeAccents(input.value) === removeAccents(q.answer)) {
                    isCorrect = true; input.style.borderBottomColor = "var(--success)"; input.style.color = "var(--success)";
                } else {
                    input.style.borderBottomColor = "var(--danger)"; input.style.color = "var(--danger)";
                    feedback.style.display = 'block'; feedback.style.backgroundColor = '#fef2f2'; feedback.style.color = '#7f1d1d';
                    feedback.innerHTML = `❌ O texto correto é: <strong>${q.answer}</strong>`;
                }
            } else if (q.type === 'desc') {
                const text = document.getElementById('answer-desc').value;
                if(!text) return alert("Escreva sua resposta!");
                document.getElementById('answer-desc').disabled = true;
                const userText = removeAccents(text); let hits = 0;
                q.keywords.forEach(kw => { if(userText.includes(removeAccents(kw))) hits++; });
                const requiredHits = Math.min(2, q.keywords.length);
                if(hits >= requiredHits) { isCorrect = true; } else {
                    feedback.style.display = 'block'; feedback.style.backgroundColor = '#fef2f2'; feedback.style.color = '#7f1d1d';
                    feedback.innerHTML = `❌ Resposta incompleta. Faltou abordar: ${q.keywords.join(", ")}`;
                }
            }

            if(isCorrect) {
                totalScore += q.pts; correctCount++;
                if(q.type !== 'fill') {
                    feedback.style.display = 'block'; feedback.style.backgroundColor = '#f0fdf4'; feedback.style.color = '#14532d';
                    feedback.innerHTML = `✅ Resposta Perfeita! +${q.pts} Pontos`;
                }
            }
            answered = true;
            document.getElementById('btn-submit').style.display = 'none'; document.getElementById('btn-next').style.display = 'inline-flex';
        }

        function goNext() {
            currentIdx++;
            if(currentIdx < activeQuestions.length) renderQ(); else finishGame();
        }

        function finishGame() {
            navigateTo('quiz-result');
            document.getElementById('final-score').innerText = `${totalScore} Pontos!`;
            document.getElementById('final-stats').innerText = `Você acertou ${correctCount} de ${activeQuestions.length} questões.`;
            const run = { mode: document.getElementById('quiz-mode').options[document.getElementById('quiz-mode').selectedIndex].text, hits: `${correctCount}/${activeQuestions.length}`, pts: totalScore };
            let hist = JSON.parse(localStorage.getItem('acfEngineHistory')) || [];
            hist.unshift(run); localStorage.setItem('acfEngineHistory', JSON.stringify(hist));
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('acfEngineHistory')) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = hist.length === 0 ? '<tr><td colspan="3">Nenhum simulado feito.</td></tr>' : '';
            hist.forEach(h => { tbody.innerHTML += `<tr><td><strong>${h.mode}</strong></td><td>${h.hits}</td><td style="color:var(--pts-color); font-weight:800;">${h.pts} pts</td></tr>`; });
        }
    </script>
</body>
</html>
